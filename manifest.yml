lzc-sdk-version: "0.1"
name: Butterfly
package: app.czyt.butterfly
version: 2.3.0
description: 高效简洁手绘笔记工具
homepage: https://github.com/LinwoodDev/Butterfly
author: LinwoodDev
application:
    subdomain: butterfly
    background_task: true
    multi_instance: false
    gpu_accel: false
    kvm_accel: false
    usb_accel: false
    public_path:
        - /
    routes:
        - /=http://butterfly:80/
services:
    butterfly:
        image: docker.1ms.run/linwooddev/butterfly:v2.3.0
